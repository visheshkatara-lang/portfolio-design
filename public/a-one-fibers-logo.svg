<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Silver play-button outer container -->
  <path d="M 12 18 
           C 12 13, 16 11, 20 13
           L 62 34
           C 66 36, 66 40, 62 42
           L 20 63
           C 16 65, 12 63, 12 58
           Z" 
        fill="url(#silverGradient)" 
        stroke="#8E8E93" 
        stroke-width="1.5" />
        
  <!-- Red inner play-button container -->
  <path d="M 18 23 
           C 14 23, 15 22, 18 23
           L 50 37
           C 52 38, 52 40, 50 41
           L 18 55
           C 16 56, 16 55, 17 52
           L 18 23" 
        fill="#E31B23" />
        
  <!-- White lowercase 'a' in the center of the red shape -->
  <circle cx="28" cy="39" r="7" fill="#FFFFFF" />
  <circle cx="28" cy="39" r="4" fill="#E31B23" />
  <rect x="31" y="36" width="3" height="8" rx="1.5" fill="#FFFFFF" />
  
  <!-- "A ONE FIBERS" typography -->
  <text x="76" y="47" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="24" fill="#E1E0CC" stroke="#000000" stroke-width="0.5" letter-spacing="0.08em">A ONE FIBERS</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="silverGradient" x1="12" y1="12" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E5E5EA" />
      <stop offset="50%" stop-color="#AEAEB2" />
      <stop offset="100%" stop-color="#3A3A3C" />
    </linearGradient>
  </defs>
</svg>
